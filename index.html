<!DOCTYPE html>
<html lang="es-GT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Documentación Vehicular | Tech v2</title>
  
  <link rel="icon" type="image/x-icon" href="img/Tech-v1.ico">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --brand-color: #BC6FF1;          
      --bg-main: #000000;              
      --bg-card: rgba(18, 18, 18, 0.95);
      --plate-color: var(--brand-color);          
      --text-white: #FFFFFF;
      --text-gray: #a1a1aa;
      --radius-lg: 28px;               
      --radius-md: 18px;               
      --header-height: 100px; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: var(--bg-main);
      color: var(--text-white);
      min-height: 100vh;
      padding-top: calc(var(--header-height) + 140px);
      padding-bottom: 140px; /* Aumentado ligeramente para la nota legal */
      user-select: none;
      -webkit-user-select: none;
      overflow-x: hidden;
      display: none; 
      transition: background-color 0.4s ease;
    }

    .fixed-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--brand-color);
      z-index: 2000;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .header-top { display: flex; align-items: center; gap: 20px; }
    
    .main-logo { 
      width: 65px; 
      filter: drop-shadow(0 0 8px var(--brand-color));
      animation: pulse-neon 2.5s infinite ease-in-out;
    }

    @keyframes pulse-neon {
      0%, 100% { filter: drop-shadow(0 0 5px var(--brand-color)); transform: scale(1); }
      50% { filter: drop-shadow(0 0 15px var(--brand-color)); transform: scale(1.03); }
    }

    h1 { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin: 0; text-align: center; }

    .selector-container { width: 100%; max-width: 450px; position: relative; }
    select { 
      width: 100%; padding: 1rem 1.2rem; border-radius: 14px; background: #111; 
      border: 1.5px solid var(--brand-color); color: white; font-weight: 700; 
      font-size: 0.85rem; cursor: pointer; outline: none;
      appearance: none; -webkit-appearance: none;
    }

    .main-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
    
    .owner-group-title {
      margin: 2.5rem 0 1.5rem 0;
      padding-left: 1rem;
      border-left: 4px solid var(--brand-color);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-white);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .vehicle-section { 
      margin-bottom: 3.5rem; padding: 2.5rem; border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.02); 
      border: 1px solid rgba(255,255,255,0.05);
      animation: fadeIn 0.6s ease forwards; 
    }

    .info-header { text-align: center; margin-bottom: 2.5rem; }
    .owner-label { color: var(--brand-color); font-weight: 800; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .plate-display { 
      background: var(--brand-color); color: #000; padding: 0.5rem 2.5rem; border-radius: 10px; 
      font-size: 2.2rem; font-weight: 900; border: 3px solid #000; display: inline-block; 
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    .grid-bento { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.8rem; }
    .card { background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: var(--radius-md); padding: 1.5rem; display: flex; flex-direction: column; transition: 0.3s; }
    .card:hover { border-color: var(--brand-color); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

    .img-box { flex: 1; background: #000; border-radius: 12px; margin: 1.2rem 0; overflow: hidden; border: 1px solid #222; min-height: 220px; position: relative; }
    .img-box img { width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; transition: 0.3s; }
    .img-box:hover img { transform: scale(1.02); }

    .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { padding: 0.85rem; border-radius: 12px; text-decoration: none; font-weight: 800; font-size: 0.7rem; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
    .btn-sat { background: rgba(255,255,255,0.07); color: white; border: 1px solid #333; }
    .btn-sat:hover { background: rgba(255,255,255,0.12); }
    .btn-pdf { background: var(--brand-color); color: #000; }
    .btn-pdf:hover { filter: brightness(1.1); }

    footer { 
      position: fixed; 
      bottom: 0; width: 100%; 
      background: rgba(0,0,0,0.92); 
      border-top: 1px solid var(--brand-color); 
      padding: 1rem 1.3rem; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 0.8rem;
      backdrop-filter: blur(10px); 
      z-index: 1001; 
    }

    .footer-content {
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .legal-notice {
      max-width: 800px;
      font-size: 0.6rem;
      color: var(--text-gray);
      text-align: center;
      line-height: 1.3;
      padding: 0 10px;
    }

    .wa-link { background: #25d366; color: white; padding: 0.8rem 1.8rem; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    #v-modal-img { 
      max-width: 90%; 
      max-height: 75vh; 
      border-radius: 8px; 
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .modal-controls { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .rotate-btn { background: var(--brand-color); color: black; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
    .rotate-hint { color: var(--text-gray); font-size: 0.75rem; font-style: italic; }
    .close-v { position: absolute; top: 1.5rem; right: 2rem; color: white; font-size: 2.5rem; cursor: pointer; opacity: 0.7; transition: 0.2s; }
    .close-v:hover { opacity: 1; transform: scale(1.1); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { body { padding-top: 240px; } .plate-display { font-size: 1.9rem; } .grid-bento { gap: 1.5rem; } }
  </style>
</head>
<body>

  <header class="fixed-header">
    <div class="header-top">
      <img id="header-logo" src="" alt="LOGO" class="main-logo">
      <h1 id="portal-title"></h1>
    </div>
    <div class="selector-container">
      <select id="vehicleSelector" onchange="filterVehicle()">
        <option value="all">TODOS LOS VEHÍCULOS REGISTRADOS</option>
      </select>
      <i class="bi bi-chevron-down" style="position: absolute; right: 1.2rem; top: 1rem; pointer-events: none; color: var(--brand-color);"></i>
    </div>
  </header>

  <main class="main-wrapper" id="content-area"></main>

  <div id="v-modal" class="modal">
    <span class="close-v" onclick="closeModal()"><i class="bi bi-x-lg"></i></span>
    <img id="v-modal-img" src="" onclick="event.stopPropagation()">
    <div class="modal-controls">
        <button class="rotate-btn" onclick="rotateImg(event)"><i class="bi bi-arrow-clockwise"></i> GIRAR DOCUMENTO</button>
        <span class="rotate-hint">Toca para rotar la orientación del archivo</span>
    </div>
  </div>

  <footer>
    <div class="legal-notice">
      Los datos mostrados son responsabilidad del usuario y se extraen de fuentes públicas/oficiales proporcionadas por el titular.
    </div>
    <div class="footer-content">
      <div style="font-size: 0.75rem;"><span style="color: var(--text-gray);">Powered by</span><br><strong id="footer-brand" style="color: var(--brand-color);"></strong></div>
      <a id="wa-link" href="#" target="_blank" class="wa-link"><i class="bi bi-whatsapp"></i> SOPORTE</a>
    </div>
  </footer>

  <script>
    const CONFIG = {
      title: "Portal de Documentación Vehicular",
      brand: "TECH® | RdeG | 2026",
      logo: "img/Tech-v1.png",
      phone: "50241084481",
      waMsg: "Hola TECH®, solicito soporte para el ID: ",
      csvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZah1DN6oRs_TNYw_dScsbpDmG9PL_hxVaVWZfzejdGTNzkaIw8BhJSBVp6ygnejLr1lRUFUGfMRSu/pub?output=csv"
    };

    let currentRotation = 0;

    async function init() {
      document.getElementById('portal-title').textContent = CONFIG.title;
      document.getElementById('header-logo').src = CONFIG.logo;
      document.getElementById('footer-brand').textContent = CONFIG.brand;

      const params = new URLSearchParams(window.location.search);
      const idURL = params.get('id');

      if (!idURL) {
        document.body.innerHTML = `<div style="padding:150px 20px; text-align:center;"><h2>ID de Acceso Requerido</h2><p style="color:#666">Por favor, utilice un enlace válido.</p></div>`;
        document.body.style.display = "block";
        return;
      }

      try {
        const response = await fetch(CONFIG.csvUrl);
        const text = await response.text();
        const rows = csvToJSON(text);
        
        const clientRows = rows.filter(r => r.id && r.id.trim().toUpperCase() === idURL.toUpperCase());

        if (clientRows.length === 0) {
          document.body.innerHTML = `<div style="padding:150px 20px; text-align:center;"><h2>Acceso Denegado</h2><p style="color:#666">El ID "${idURL}" no está registrado.</p></div>`;
          document.body.style.display = "block";
          return;
        }

        const root = document.documentElement;
        if (clientRows[0].color) root.style.setProperty('--brand-color', clientRows[0].color);
        if (clientRows[0].fondo) root.style.setProperty('--bg-main', clientRows[0].fondo);

        const structure = {};
        clientRows.forEach(row => {
          const prop = row.propietario || "Información General";
          const placa = row.placa || "S/P";
          if (!structure[prop]) structure[prop] = {};
          if (!structure[prop][placa]) structure[prop][placa] = [];
          structure[prop][placa].push({
            nombre: row.nombredoc,
            img: row.urlimagen,
            pdf: row.urlpdf,
            sat: row.urlsat,
            icon: row.icono || 'bi-file-earmark'
          });
        });

        renderPortal(structure, idURL);
      } catch (e) {
        console.error("Error cargando base de datos:", e);
        document.body.style.display = "block";
      }
    }

    function csvToJSON(csv) {
      const lines = csv.split(/\r?\n/);
      const result = [];
      const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i]) continue;
        const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const obj = {};
        headers.forEach((header, index) => {
          let value = currentline[index] ? currentline[index].trim() : "";
          obj[header] = value.replace(/^"|"$/g, ''); 
        });
        result.push(obj);
      }
      return result;
    }

    function renderPortal(structure, id) {
      document.body.style.display = "block";
      const selector = document.getElementById('vehicleSelector');
      const content = document.getElementById('content-area');

      for (const propietario in structure) {
        const propContainer = document.createElement('div');
        propContainer.className = 'owner-group';
        propContainer.innerHTML = `<div class="owner-group-title">${propietario}</div>`;
        
        for (const placa in structure[propietario]) {
          const docs = structure[propietario][placa];
          let opt = document.createElement('option');
          opt.value = placa;
          opt.textContent = `${placa} | ${propietario}`;
          selector.appendChild(opt);

          const sec = document.createElement('section');
          sec.id = `view-${placa}`;
          sec.className = 'vehicle-section';
          sec.innerHTML = `
            <div class="info-header">
              <span class="owner-label">CLIENTE ID: ${id}</span>
              <div class="plate-display">${placa}</div>
            </div>
            <div class="grid-bento">${docs.map(doc => `
              <div class="card">
                <div style="font-weight: 800; display:flex; gap:10px; align-items:center; font-size: 0.8rem;">
                  <i class="bi ${doc.icon}" style="color:var(--brand-color); font-size: 1.1rem;"></i> ${doc.nombre}
                </div>
                <div class="img-box" onclick="zoom('${doc.img}')">
                  <img src="${doc.img}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x500/111/bc6ff1?text=Cargando...'">
                </div>
                <div class="btn-stack">
                    <a href="${doc.pdf}" target="_blank" class="btn btn-pdf"><i class="bi bi-file-earmark-pdf-fill"></i> PDF</a>
                    <a href="${doc.sat}" target="_blank" class="btn btn-sat"><i class="bi bi-globe"></i> SAT</a>               
                </div>
              </div>`).join('')}
            </div>`;
          propContainer.appendChild(sec);
        }
        content.appendChild(propContainer);
      }
      document.getElementById('wa-link').href = `https://wa.me/${CONFIG.phone}?text=${encodeURIComponent(CONFIG.waMsg + id)}`;
    }

    function filterVehicle() {
      const val = document.getElementById('vehicleSelector').value;
      const secs = document.querySelectorAll('.vehicle-section');
      const titles = document.querySelectorAll('.owner-group-title');
      if (val === 'all') {
        secs.forEach(s => s.style.display = 'block');
        titles.forEach(t => t.style.display = 'block');
      } else {
        secs.forEach(s => s.style.display = (s.id === `view-${val}`) ? 'block' : 'none');
        titles.forEach(t => {
          const parent = t.parentElement;
          const hasVisible = Array.from(parent.querySelectorAll('.vehicle-section')).some(s => s.style.display === 'block');
          t.style.display = hasVisible ? 'block' : 'none';
        });
        window.scrollTo({ top: 180, behavior: 'smooth' });
      }
    }

    function zoom(src) {
      currentRotation = 0;
      const img = document.getElementById('v-modal-img');
      img.src = src; 
      img.style.transform = `rotate(0deg)`;
      document.getElementById('v-modal').style.display = 'flex';
    }

    function rotateImg(e) { 
      e.stopPropagation(); 
      currentRotation += 90; 
      document.getElementById('v-modal-img').style.transform = `rotate(${currentRotation}deg)`; 
    }
    
    function closeModal() { document.getElementById('v-modal').style.display = 'none'; }

    // BLOQUEOS DE SEGURIDAD
    document.addEventListener('contextmenu', e => { if (e.target.id !== 'v-modal-img') e.preventDefault(); });
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false; };

    init();
  </script>
</body>
</html>
