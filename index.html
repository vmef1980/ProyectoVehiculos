<!DOCTYPE html>
<html lang="es-GT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal de Documentación Vehicular | Tech Mobile Pro</title>
  
  <link rel="icon" type="image/x-icon" href="img/Tech-v1.ico">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --brand-color: #BC6FF1;          
      --bg-main: #0b0b0c;              
      --bg-card: rgba(20, 20, 22, 0.7);
      --bg-input: #161618;
      --border-color: rgba(255, 255, 255, 0.06);
      --text-white: #FFFFFF;
      --text-gray: #a1a1aa;
      --text-muted: #71717a;
      --radius-xl: 24px;
      --radius-lg: 16px;               
      --radius-md: 12px;               
      --header-height: 72px; 
    }

    * { 
      margin: 0; padding: 0; box-sizing: border-box; 
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-white);
      min-height: 100vh;
      padding-top: calc(var(--header-height) + 20px);
      padding-bottom: 110px; 
      user-select: none;
      -webkit-user-select: none;
      overflow-x: hidden;
      display: none; 
    }

    /* PANTALLA DE BLOQUEO PREMIUM */
    .pin-screen {
      position: fixed;
      inset: 0;
      background: #000000;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .pin-container {
      width: 100%;
      max-width: 380px;
      padding: 2rem;
      text-align: center;
    }

    .pin-logo {
      width: 70px;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 12px var(--brand-color));
    }

    .pin-container h2 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .pin-container p {
      color: var(--text-gray);
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 2.5rem;
    }

    .pin-input-wrapper {
      margin-bottom: 1.5rem;
    }

    .pin-input-wrapper input {
      width: 100%;
      padding: 1.2rem;
      border-radius: var(--radius-lg);
      background: var(--bg-input);
      border: 1.5px solid var(--border-color);
      color: white;
      font-size: 1.8rem;
      letter-spacing: 12px;
      text-align: center;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .pin-input-wrapper input:focus {
      border-color: var(--brand-color);
      box-shadow: 0 0 20px rgba(188, 111, 241, 0.15);
      background: #000;
    }

    .btn-unlock {
      width: 100%;
      padding: 1.1rem;
      border: none;
      background: var(--brand-color);
      color: #000;
      font-weight: 700;
      border-radius: var(--radius-lg);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-unlock:active {
      transform: scale(0.98);
      filter: brightness(0.9);
    }

    .pin-error {
      color: #ff4545;
      font-size: 0.85rem;
      margin-top: 1.2rem;
      font-weight: 600;
      display: none;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    /* HEADER NATIVO MÓVIL */
    .fixed-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(11, 11, 12, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      z-index: 2000;
      padding: 0 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .main-logo { width: 38px; filter: drop-shadow(0 0 6px var(--brand-color)); }
    h1 { font-size: 1rem; font-weight: 700; letter-spacing: -0.2px; }

    /* CONTENEDOR SELECTOR MEJORADO (ZONA ACCESIBLE) */
    .sticky-selector-bar {
      padding: 0.5rem 1.2rem 1rem 1.2rem;
      background: var(--bg-main);
    }
    
    .selector-container { width: 100%; position: relative; }
    select { 
      width: 100%; padding: 1rem 1.2rem; border-radius: var(--radius-md); background: var(--bg-card); 
      border: 1px solid var(--border-color); color: white; font-weight: 600; 
      font-size: 0.9rem; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--brand-color); }

    /* ESTRUCTURA DE CONTENIDO */
    .main-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.2rem; }
    
    .owner-group-title {
      margin: 2rem 0 1rem 0;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* VISTA DE VEHÍCULO COMPACTA (TIPO APP) */
    .vehicle-section { 
      margin-bottom: 1.5rem; 
      background: var(--bg-card); 
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      overflow: hidden;
      animation: fadeIn 0.4s ease-out forwards; 
    }

    .info-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 1.2rem;
      border-bottom: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.01);
    }
    .owner-label { color: var(--text-gray); font-weight: 500; font-size: 0.8rem; }
    .plate-display { 
      background: rgba(255, 255, 255, 0.06); color: var(--brand-color); padding: 0.4rem 1rem; border-radius: 8px; 
      font-size: 1.1rem; font-weight: 800; border: 1px solid rgba(255, 255, 255, 0.05);
      letter-spacing: 0.5px;
    }

    /* LISTA OPTIMIZADA EN LUGAR DE REJILLA GIGANTE */
    .document-list { display: flex; flex-direction: column; }
    .document-item { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 1rem 1.2rem; 
      border-bottom: 1px solid var(--border-color);
    }
    .document-item:last-child { border-bottom: none; }

    .doc-info-block { display: flex; align-items: center; gap: 14px; flex: 1; }
    .doc-icon-wrapper {
      width: 42px; height: 42px; border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      display: flex; align-items: center; justify-content: center;
      color: var(--brand-color); font-size: 1.2rem;
      border: 1px solid var(--border-color);
    }
    
    .doc-texts { display: flex; flex-direction: column; gap: 2px; }
    .doc-title { font-size: 0.9rem; font-weight: 600; color: var(--text-white); }
    .doc-action-hint { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }

    /* BOTONES DE ACCIÓN COMPACTOS Y ACCESIBLES */
    .action-group { display: flex; align-items: center; gap: 8px; }
    
    .btn-circle {
      width: 38px; height: 38px; border-radius: 50px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 1rem; transition: background 0.2s;
    }
    .btn-circle-view { background: rgba(188, 111, 241, 0.1); color: var(--brand-color); border: 1px solid rgba(188, 111, 241, 0.15); }
    .btn-circle-pdf { background: var(--brand-color); color: #000; }
    .btn-circle-sat { background: #161618; color: var(--text-gray); border: 1px solid var(--border-color); }

    .btn-circle:active { transform: scale(0.92); }

    /* FOOTER INTEGRADO ESTILO TAB-BAR COMPATIBLE */
    footer { 
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(11, 11, 12, 0.85); 
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid var(--border-color); 
      padding: 1rem 1.5rem calc(1rem + env(safe-area-inset-bottom)) 1.5rem; 
      display: flex; align-items: center; justify-content: space-between;
      z-index: 1001; 
    }
    .footer-brand-side { display: flex; flex-direction: column; gap: 2px; }
    .wa-link { 
      background: #25d366; color: white; padding: 0.7rem 1.2rem; border-radius: 50px; 
      text-decoration: none; font-weight: 700; font-size: 0.8rem; 
      display: flex; align-items: center; gap: 6px; 
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.15); 
    }

    /* MODAL DE VISUALIZACIÓN ULTRA COMPLETA */
    .modal { 
      position: fixed; inset: 0; background: #000000; 
      display: none; z-index: 9999; flex-direction: column; 
      justify-content: center; align-items: center;
    }
    #v-modal-img { 
      max-width: 100%; max-height: 80vh; width: auto; height: auto;
      object-fit: contain;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .modal-controls { 
      position: absolute; bottom: calc(2rem + env(safe-area-inset-bottom)); 
      left: 0; right: 0; display: flex; flex-direction: column; gap: 10px; align-items: center; 
    }
    .rotate-btn { 
      background: #ffffff; color: #000000; border: none; padding: 1rem 2rem; 
      border-radius: 50px; font-weight: 700; cursor: pointer; display: flex; 
      align-items: center; gap: 8px; font-size: 0.9rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .close-v { 
      position: absolute; top: calc(1rem + env(safe-area-inset-top)); right: 1.2rem; 
      width: 44px; height: 44px; border-radius: 50px; background: rgba(255,255,255,0.08);
      color: white; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="pinScreen" class="pin-screen">
    <div class="pin-container">
      <img id="pin-logo" src="" alt="LOGO" class="pin-logo">
      <h2>Acceso Protegido</h2>
      <p>Introduce tu PIN para visualizar el expediente de documentación vehicular.</p>
      <div class="pin-input-wrapper">
        <input type="password" id="pinInput" placeholder="••••" maxlength="6" inputmode="numeric" pattern="[0-9]*" onkeydown="if(event.key === 'Enter') verifyPin()">
      </div>
      <button class="btn-unlock" onclick="verifyPin()">Ingresar</button>
      <div id="pinError" class="pin-error">PIN incorrecto. Inténtalo de nuevo.</div>
    </div>
  </div>

  <header class="fixed-header">
    <div class="header-left">
      <img id="header-logo" src="" alt="LOGO" class="main-logo">
      <h1 id="portal-title"></h1>
    </div>
  </header>

  <div class="sticky-selector-bar">
    <div class="selector-container">
      <select id="vehicleSelector" onchange="filterVehicle()">
        <option value="all">TODOS LOS VEHÍCULOS</option>
      </select>
      <i class="bi bi-chevron-down" style="position: absolute; right: 1.2rem; top: 1.1rem; pointer-events: none; color: var(--brand-color); font-size: 0.8rem;"></i>
    </div>
  </div>

  <main class="main-wrapper" id="content-area"></main>

  <div id="v-modal" class="modal" onclick="closeModal()">
    <span class="close-v" onclick="closeModal()"><i class="bi bi-x-lg"></i></span>
    <img id="v-modal-img" src="" onclick="event.stopPropagation()">
    <div class="modal-controls">
        <button class="rotate-btn" onclick="rotateImg(event)"><i class="bi bi-arrow-clockwise"></i> Voltear Imagen</button>
    </div>
  </div>

  <footer>
    <div class="footer-brand-side">
      <span style="font-size: 0.65rem; color: var(--text-muted); font-weight: 600;">PORTAL OFICIAL</span>
      <strong id="footer-brand" style="color: var(--brand-color); font-size: 0.75rem;"></strong>
    </div>
    <a id="wa-link" href="#" target="_blank" class="wa-link"><i class="bi bi-whatsapp"></i> Soporte</a>
  </footer>

  <script>
    const CONFIG = {
      title: "Documentos Vehiculares",
      brand: "TECH® | RdeG | 2026",
      logo: "img/Tech-v1.png",
      phone: "50241084481",
      waMsg: "Hola TECH®, solicito soporte para el ID: ",
      csvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZah1DN6oRs_TNYw_dScsbpDmG9PL_hxVaVWZfzejdGTNzkaIw8BhJSBVp6ygnejLr1lRUFUGfMRSu/pub?output=csv"
    };

    let currentRotation = 0;
    let targetPin = ""; 
    let globalStructure = {};
    let globalIdURL = "";

    async function init() {
      try {
        document.getElementById('portal-title').textContent = CONFIG.title;
        document.getElementById('header-logo').src = CONFIG.logo;
        
        const pinLogo = document.getElementById('pin-logo');
        if (pinLogo) pinLogo.src = CONFIG.logo;
        
        document.getElementById('footer-brand').textContent = CONFIG.brand;

        const params = new URLSearchParams(window.location.search);
        globalIdURL = params.get('id');

        if (!globalIdURL) {
          showErrorMessage("ID Requerido", "Por favor, utiliza un enlace con un ID de cliente válido.");
          return;
        }

        const response = await fetch(CONFIG.csvUrl);
        if (!response.ok) throw new Error("Error de Red");
        
        const text = await response.text();
        const rows = csvToJSON(text);
        
        const clientRows = rows.filter(r => r.id && r.id.trim().toUpperCase() === globalIdURL.toUpperCase());

        if (clientRows.length === 0) {
          showErrorMessage("No Registrado", `El ID "${globalIdURL}" no se encuentra en el sistema.`);
          return;
        }

        targetPin = clientRows[0].pin ? clientRows[0].pin.trim() : "";
        
        const root = document.documentElement;
        if (clientRows[0].color) root.style.setProperty('--brand-color', clientRows[0].color);
        if (clientRows[0].fondo) root.style.setProperty('--bg-main', clientRows[0].fondo);

        globalStructure = {}; 
        clientRows.forEach(row => {
          const prop = row.propietario || "Información General";
          const placa = row.placa || "S/P";
          if (!globalStructure[prop]) globalStructure[prop] = {};
          if (!globalStructure[prop][placa]) globalStructure[prop][placa] = [];
          
          globalStructure[prop][placa].push({
            nombre: row.nombredoc || "Documento",
            img: row.urlimagen || "",
            pdf: row.urlpdf || "#",
            sat: row.urlsat || "#",
            icon: row.icono || 'bi-file-earmark-text'
          });
        });

        const pinScreen = document.getElementById('pinScreen');
        
        if (sessionStorage.getItem(`auth_${globalIdURL}`) === 'true' || targetPin === "") {
          if (pinScreen) pinScreen.style.display = "none";
          showPortal();
        } else {
          if (pinScreen) {
            pinScreen.style.display = "flex";
            document.body.style.display = "block";
            const pinInput = document.getElementById('pinInput');
            if (pinInput) pinInput.focus();
          }
        }

      } catch (e) {
        console.error(e);
        showErrorMessage("Error de Carga", "Hubo problemas de comunicación con la base de datos.");
      }
    }

    function showErrorMessage(title, subtitle) {
      const pinScreen = document.getElementById('pinScreen');
      if (pinScreen) pinScreen.style.display = "none";
      
      document.body.innerHTML = `
        <div style="padding:150px 24px; text-align:center; background:#0b0b0c; color:#fff; min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
          <h2 style="color: #ff4545; font-size:1.4rem; font-weight:800; margin-bottom:8px;">${title}</h2>
          <p style="color:#71717a; font-size:0.9rem;">${subtitle}</p>
        </div>`;
      document.body.style.display = "block";
    }

    function verifyPin() {
      const inputEv = document.getElementById('pinInput');
      const errorDiv = document.getElementById('pinError');
      if (!inputEv) return;

      if (inputEv.value.trim() === targetPin) {
        sessionStorage.setItem(`auth_${globalIdURL}`, 'true');
        const pinScreen = document.getElementById('pinScreen');
        if (pinScreen) {
          pinScreen.style.transition = "opacity 0.3s ease";
          pinScreen.style.opacity = "0";
          setTimeout(() => {
            pinScreen.style.display = "none";
            showPortal();
          }, 300);
        } else {
          showPortal();
        }
      } else {
        if (errorDiv) {
          errorDiv.style.display = "block";
          inputEv.style.animation = 'shake 0.3s ease';
          setTimeout(() => { inputEv.style.animation = ''; }, 300);
        }
        inputEv.value = "";
        inputEv.focus();
      }
    }

    function showPortal() {
      renderPortal(globalStructure, globalIdURL);
    }

    function csvToJSON(csv) {
      const lines = csv.split(/\r?\n/);
      const result = [];
      if (lines.length === 0 || !lines[0]) return result;
      
      const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/^"|"$/g, ''));
      
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const obj = {};
        
        headers.forEach((header, index) => {
          let value = currentline[index] ? currentline[index].trim() : "";
          obj[header] = value.replace(/^"|"$/g, ''); 
        });
        result.push(obj);
      }
      return result;
    }

    function renderPortal(structure, id) {
      document.body.style.display = "block";
      const selector = document.getElementById('vehicleSelector');
      const content = document.getElementById('content-area');
      
      if (!selector || !content) return;

      content.innerHTML = ""; 
      selector.innerHTML = '<option value="all">MOSTRAR TODOS LOS VEHÍCULOS</option>';

      let hasData = false;

      for (const propietario in structure) {
        hasData = true;
        const propContainer = document.createElement('div');
        propContainer.className = 'owner-group';
        propContainer.innerHTML = `<div class="owner-group-title">${propietario}</div>`;
        
        for (const placa in structure[propietario]) {
          const docs = structure[propietario][placa];
          let opt = document.createElement('option');
          opt.value = placa;
          opt.textContent = `🚗 ${placa} (${propietario})`;
          selector.appendChild(opt);

          const sec = document.createElement('section');
          sec.id = `view-${placa}`;
          sec.className = 'vehicle-section';
          sec.innerHTML = `
            <div class="info-header">
              <span class="owner-label">ID: ${id}</span>
              <div class="plate-display">${placa}</div>
            </div>
            <div class="document-list">${docs.map(doc => `
              <div class="document-item">
                <div class="doc-info-block">
                  <div class="doc-icon-wrapper">
                    <i class="bi ${doc.icon}"></i>
                  </div>
                  <div class="doc-texts">
                    <span class="doc-title">${doc.nombre}</span>
                    <span class="doc-action-hint">Ver detalles e historial</span>
                  </div>
                </div>
                <div class="action-group">
                    <button onclick="zoom('${doc.img}')" class="btn-circle btn-circle-view" title="Ver documento"><i class="bi bi-eye-fill"></i></button>
                    <a href="${doc.pdf}" target="_blank" class="btn-circle btn-circle-pdf" title="Descargar PDF"><i class="bi bi-file-earmark-pdf"></i></a>
                    <a href="${doc.sat}" target="_blank" class="btn-circle btn-circle-sat" title="Enlace SAT"><i class="bi bi-globe"></i></a>               
                </div>
              </div>`).join('')}
            </div>`;
          propContainer.appendChild(sec);
        }
        content.appendChild(propContainer);
      }

      if (!hasData) {
        content.innerHTML = `<div style="text-align:center; padding: 50px; color: var(--text-muted);">Sin archivos activos.</div>`;
      }

      const waLink = document.getElementById('wa-link');
      if (waLink) waLink.href = `https://wa.me/${CONFIG.phone}?text=${encodeURIComponent(CONFIG.waMsg + id)}`;
    }

    function filterVehicle() {
      const val = document.getElementById('vehicleSelector').value;
      const secs = document.querySelectorAll('.vehicle-section');
      const titles = document.querySelectorAll('.owner-group-title');
      if (val === 'all') {
        secs.forEach(s => s.style.display = 'block');
        titles.forEach(t => t.style.display = 'block');
      } else {
        secs.forEach(s => s.style.display = (s.id === `view-${val}`) ? 'block' : 'none');
        titles.forEach(t => {
          const parent = t.parentElement;
          const hasVisible = Array.from(parent.querySelectorAll('.vehicle-section')).some(s => s.style.display === 'block');
          t.style.display = hasVisible ? 'block' : 'none';
        });
      }
    }

    function zoom(src) {
      currentRotation = 0;
      const img = document.getElementById('v-modal-img');
      if (!img) return;
      img.src = src; 
      img.style.transform = `rotate(0deg)`;
      const modal = document.getElementById('v-modal');
      if (modal) modal.style.display = 'flex';
    }

    function rotateImg(e) { 
      e.stopPropagation(); 
      currentRotation += 90; 
      const img = document.getElementById('v-modal-img');
      if (img) img.style.transform = `rotate(${currentRotation}deg)`; 
    }
    
    function closeModal() { 
      const modal = document.getElementById('v-modal');
      if (modal) modal.style.display = 'none'; 
    }

    // BLOQUEOS DE SEGURIDAD NATIVOS
    document.addEventListener('contextmenu', e => { if (e.target.id !== 'v-modal-img') e.preventDefault(); });
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false; };

    init();
  </script>
</body>
</html>
